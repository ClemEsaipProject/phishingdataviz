[pytest]
testpaths      = tests
pythonpath     = .
python_files   = test_*.py
python_classes = Test*
python_functions = test_*
log_cli        = true
log_cli_level  = INFO
log_file       = logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s | %(levelname)-8s | %(name)s | %(message)s
